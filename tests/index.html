<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectionGuide AI — Test Suite</title>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 1rem; background: #f8fafc; color: #0f172a; }
        h1   { font-size: 1.5rem; margin-bottom: 0.25rem; }
        p.subtitle { color: #64748b; margin-bottom: 2rem; font-size: 0.9rem; }
        .summary      { font-size: 1.1rem; font-weight: 600; padding: 0.75rem 1.25rem; border-radius: 8px; margin-bottom: 1.5rem; }
        .summary.pass { background: #ecfdf5; color: #065f46; border: 1px solid #6ee7b7; }
        .summary.fail { background: #fef2f2; color: #991b1b; border: 1px solid #fca5a5; }
        ul { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 0.35rem; }
        li { padding: 0.5rem 0.75rem; border-radius: 6px; font-size: 0.875rem; }
        li.pass { background: #f0fdf4; color: #166534; }
        li.fail { background: #fef2f2; color: #991b1b; font-weight: 500; }
        #loading { color: #64748b; padding: 1rem 0; }
    </style>
</head>
<body>
    <h1>🧪 ElectionGuide AI — Test Suite</h1>
    <p class="subtitle">Open in a browser to run all unit tests. No build tools required.</p>
    <div id="summary" class="summary">Running…</div>
    <p id="loading">Loading scripts…</p>
    <ul id="results"></ul>

    <!-- Load source modules in dependency order (cache-busted for testing) -->
    <script src="../config/config.js?v=2"></script>
    <script src="../utils/formatting.js?v=2"></script>
    <script src="../logic/appState.js?v=2"></script>
    <script src="../services/geminiService.js?v=2"></script>
    <script src="../services/calendarService.js?v=2"></script>
    <script src="../logic/flows.js?v=2"></script>

    <!-- Run tests -->
    <script src="tests.js?v=2"></script>
    <script>
        document.getElementById('loading').remove();
    </script>
</body>
</html>
